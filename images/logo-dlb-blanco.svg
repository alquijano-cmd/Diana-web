<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 90" role="img" aria-label="DLB Estudio Jurídico – Diana Leslie Blanco">
  <title>DLB Estudio Jurídico</title>
  <desc>Logo de Diana Leslie Blanco Estudio Jurídico, firma de abogados en Bucaramanga Colombia</desc>

  <!-- Línea decorativa superior izquierda -->
  <line x1="0" y1="8" x2="52" y2="8" stroke="#C9A84C" stroke-width="1.2"/>

  <!-- Monograma DLB -->
  <text x="0" y="62"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="62"
    font-weight="700"
    letter-spacing="4"
    fill="#FFFFFF">D</text>
  <text x="44" y="62"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="62"
    font-weight="300"
    fill="#C9A84C">L</text>
  <text x="82" y="62"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="62"
    font-weight="700"
    fill="#FFFFFF">B</text>

  <!-- Separador vertical dorado -->
  <line x1="136" y1="10" x2="136" y2="78" stroke="#C9A84C" stroke-width="1"/>

  <!-- Texto derecho -->
  <text x="150" y="34"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="17"
    font-weight="400"
    font-style="italic"
    fill="#FFFFFF"
    letter-spacing="0.5">Diana Leslie Blanco</text>

  <line x1="150" y1="43" x2="338" y2="43" stroke="#C9A84C" stroke-width="0.7" opacity="0.6"/>

  <text x="150" y="62"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="10.5"
    font-weight="600"
    letter-spacing="4.5"
    fill="rgba(255,255,255,0.85)">ESTUDIO JURÍDICO</text>

  <line x1="150" y1="72" x2="338" y2="72" stroke="#C9A84C" stroke-width="0.7" opacity="0.4"/>
</svg>
